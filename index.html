<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life & Death Hardware — Sample EOI · Summer 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --white: #ffffff;
  --ink: #1a1a1a;
  --mid: #6b6b6b;
  --light: #e8e8e4;
  --rule: #deded8;
  --accent: #1a1a1a;
  --checked-bg: #f5f5f5;
  --page-max: 860px;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── PAGE WRAPPER ── */
.page {
  max-width: var(--page-max);
  margin: 0 auto;
  padding: 0 24px;
}

/* ── HEADER ── */
.site-header {
  padding: 48px 0 36px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 40px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}

.brand-lockup { display:flex; align-items:center; }

.header-meta {
  text-align: right;
}

.header-meta .doc-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--mid);
  display: block;
}

.header-meta .doc-season {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--ink);
  margin-top: 4px;
  display: block;
}

/* ── NOTICE ── */
.notice {
  background: #ffffff;
  border: 1px solid var(--rule);
  padding: 18px 22px;
  margin-bottom: 36px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
}

.notice-icon {
  font-size: 16px;
  flex-shrink: 0;
  margin-top: 1px;
}

.notice p {
  font-size: 13px;
  color: var(--mid);
  line-height: 1.6;
}

.notice p strong {
  color: var(--ink);
  font-weight: 600;
}

/* ── SECTION HEADING ── */
.section-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--mid);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--rule);
}

/* ── CONTACT GRID ── */
.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 44px;
}

.field {}

.field label {
  display: block;
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--mid);
  margin-bottom: 7px;
}

.field input {
  width: 100%;
  background: #ffffff;
  border: 1px solid var(--rule);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  padding: 10px 13px;
  outline: none;
  transition: border-color 0.2s;
  border-radius: 0;
  -webkit-appearance: none;
}

.field input:focus {
  border-color: var(--ink);
}

.field input::placeholder {
  color: #c0c0bc;
}

/* ── PRODUCT CATEGORIES ── */
.category-block {
  margin-bottom: 32px;
}

/* ── PRODUCT ROW ── */
.product-row {
  display: grid;
  grid-template-columns: 36px 68px 1fr auto;
  align-items: center;
  padding: 13px 0;
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
  transition: background 0.1s;
  border-radius: 2px;
  gap: 0;
  user-select: none;
}

.product-row:first-of-type {
  border-top: 1px solid var(--rule);
}

.product-row:hover {
  background: #ffffff;
  padding-left: 6px;
  padding-right: 6px;
  margin-left: -6px;
  margin-right: -6px;
}

.product-row.is-checked {
  background: var(--checked-bg);
  padding-left: 6px;
  padding-right: 6px;
  margin-left: -6px;
  margin-right: -6px;
}

/* Checkbox */
.cb {
  display: flex;
  align-items: center;
  justify-content: flex-start;
}

.cb-box {
  width: 18px;
  height: 18px;
  border: 1.5px solid #c0c0bc;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}

.product-row.is-checked .cb-box {
  border-color: var(--ink);
  background: var(--ink);
}

.cb-check {
  opacity: 0;
  transform: scale(0.5);
  transition: all 0.15s;
}

.product-row.is-checked .cb-check {
  opacity: 1;
  transform: scale(1);
}

/* Product Info */
.prod-info {}

.prod-name {
  font-weight: 500;
  font-size: 14px;
  color: var(--ink);
}

.prod-specs {
  font-size: 12px;
  color: var(--mid);
  margin-top: 1px;
}

/* Sample tag */
.sample-tag {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #888884;
  transition: color 0.15s;
  white-space: nowrap;
}

.product-row.is-checked .sample-tag {
  color: var(--ink);
}

/* ── TALLY BAR ── */
.tally-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #ffffff;
  border-bottom: 1px solid var(--rule);
  padding: 12px 0;
  margin-bottom: 36px;
  margin-left: -24px;
  margin-right: -24px;
  padding-left: 24px;
  padding-right: 24px;
  display: flex;
  align-items: center;
  gap: 24px;
}

.tally-num {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 28px;
  line-height: 1;
  color: var(--ink);
  min-width: 32px;
}

.tally-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--mid);
}

.tally-divider {
  width: 1px;
  height: 24px;
  background: var(--rule);
}

.tally-progress {
  flex: 1;
  height: 2px;
  background: var(--light);
  border-radius: 1px;
  overflow: hidden;
}

.tally-fill {
  height: 100%;
  background: var(--ink);
  border-radius: 1px;
  transition: width 0.3s ease;
  width: 0%;
}

/* ── NOTES ── */
.notes-block {
  margin-bottom: 40px;
}

.notes-block textarea {
  width: 100%;
  background: #ffffff;
  border: 1px solid var(--rule);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  padding: 12px 14px;
  outline: none;
  resize: vertical;
  min-height: 90px;
  transition: border-color 0.2s;
  line-height: 1.6;
}

.notes-block textarea:focus { border-color: var(--ink); }
.notes-block textarea::placeholder { color: #c0c0bc; }

/* ── SUBMIT SECTION ── */
.submit-section {
  border-top: 1px solid var(--rule);
  padding: 32px 0 64px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.btn-submit {
  background: var(--ink);
  color: var(--white);
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 14px;
  padding: 13px 28px;
  cursor: pointer;
  transition: opacity 0.15s;
  letter-spacing: 0.2px;
}

.btn-submit:hover { opacity: 0.8; }
.btn-submit:disabled { opacity: 0.35; cursor: not-allowed; }

.btn-clear {
  background: transparent;
  color: var(--mid);
  border: 1px solid var(--rule);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 13px 20px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-clear:hover { border-color: var(--mid); color: var(--ink); }

.submit-note {
  font-size: 12px;
  color: var(--mid);
  margin-left: auto;
}

/* ── VALIDATION ERROR ── */
.error-msg {
  display: none;
  background: #fff4f4;
  border: 1px solid #f0c0c0;
  color: #c04040;
  font-size: 13px;
  padding: 12px 16px;
  margin-bottom: 24px;
}

.error-msg.visible { display: block; }

/* ── FOOTER ── */
.site-footer {
  border-top: 1px solid var(--rule);
  padding: 20px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.site-footer p {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 1px;
  color: #c0c0bc;
}

/* Responsive */
@media (max-width: 600px) {
  .contact-grid { grid-template-columns: 1fr; }
  .site-header { flex-direction: column; align-items: flex-start; gap: 16px; }
  .header-meta { text-align: left; }
  .submit-section { flex-direction: column; align-items: flex-start; }
  .submit-note { margin-left: 0; }
  .tally-bar { flex-wrap: wrap; }
}

/* ── THUMBNAILS ── */
.prod-thumb {
  width: 56px;
  height: 56px;
  object-fit: cover;
  object-position: center top;
  flex-shrink: 0;
  border: 1px solid #eee;
  background: #f8f8f8;
  margin-right: 12px;
}
.prod-thumb-placeholder {
  width: 56px;
  height: 56px;
  flex-shrink: 0;
  background: #f5f5f5;
  border: 1px solid #eee;
  margin-right: 12px;
}


/* ── EDIT MODE ── */
.edit-toggle {
  background: transparent;
  border: 1px solid var(--rule);
  color: var(--mid);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 7px 14px;
  cursor: pointer;
  transition: all 0.15s;
  margin-left: 12px;
}
.edit-toggle:hover, .edit-toggle.active { border-color: var(--ink); color: var(--ink); }

.prod-colour {
  font-size: 12px;
  color: var(--mid);
  margin-top: 1px;
}
.colour-input {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--ink);
  border: none;
  border-bottom: 1px dashed #ccc;
  background: transparent;
  outline: none;
  width: 100%;
  padding: 1px 0;
  margin-top: 1px;
  display: none;
}
.colour-input:focus { border-bottom-color: var(--ink); }
body.edit-mode .prod-colour { display: none; }
body.edit-mode .colour-input { display: block; }

</style>
</head>

let selected = new Set();
const totalItems = PRODUCTS.reduce((a, c) => a + c.items.length, 0);

function buildProducts() {
  const container = document.getElementById('products-container');
  document.getElementById('total-num').textContent = totalItems;

  PRODUCTS.forEach(cat => {
    const block = document.createElement('div');
    block.className = 'category-block';

    const heading = document.createElement('div');
    heading.className = 'section-label';
    heading.textContent = cat.category;
    block.appendChild(heading);

    cat.items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'product-row';
      row.dataset.id = item.id;
      const thumbSrc = PRODUCT_IMAGES[item.id];
      const thumbHtml = thumbSrc
        ? `<img class="prod-thumb" src="${thumbSrc}" alt="">`
        : `<div class="prod-thumb-placeholder"></div>`;

      const specParts = item.specs.split(' · ');
      const colour = specParts[specParts.length - 1];
      const baseSpecs = specParts.slice(0, -1).join(' · ');

      row.innerHTML = `
        <div class="cb">
          <div class="cb-box">
            <svg class="cb-check" width="10" height="8" viewBox="0 0 10 8" fill="none">
              <path d="M1 4L3.8 7L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        ${thumbHtml}
        <div class="prod-info">
          <div class="prod-name">${item.name}</div>
          <div class="prod-specs">${baseSpecs}</div>
          <div class="prod-colour">${colour}</div>
          <input class="colour-input" type="text" value="${colour}" placeholder="Colour name">
        </div>
        <div class="sample-tag">Sample request</div>
      `;
      row.querySelector('.colour-input').addEventListener('click', e => e.stopPropagation());
      row.addEventListener('click', () => toggle(row, item.id));
      block.appendChild(row);
    });

    container.appendChild(block);
  });
}

function toggle(row, id) {
  if (selected.has(id)) {
    selected.delete(id);
    row.classList.remove('is-checked');
  } else {
    selected.add(id);
    row.classList.add('is-checked');
  }
  updateTally();
  hideError();
}

function updateTally() {
  document.getElementById('tally-num').textContent = selected.size;
  document.getElementById('tally-fill').style.width = ((selected.size / totalItems) * 100) + '%';
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('visible');
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function hideError() {
  document.getElementById('error-msg').classList.remove('visible');
}

function clearAll() {
  selected.clear();
  document.querySelectorAll('.product-row').forEach(r => r.classList.remove('is-checked'));
  document.getElementById('f-name').value = '';
  document.getElementById('f-store').value = '';
  document.getElementById('f-email').value = '';
  document.getElementById('f-notes').value = '';
  updateTally();
  hideError();
}

function submitEOI() {
  const name  = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const notes = document.getElementById('f-notes').value.trim();

  // Validation
  if (!name) { showError('Please enter your name before submitting.'); return; }
  if (!email || !email.includes('@')) { showError('Please enter a valid email address.'); return; }
  if (selected.size === 0) { showError('Please select at least one product before submitting.'); return; }

  const date = new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });

  // Build email body
  let body = `LIFE & DEATH HARDWARE\nSample Expression of Interest — Summer 2026\n`;
  body += `${'─'.repeat(48)}\n\n`;
  body += `CONTACT\n`;
  body += `Name:   ${name}\n`;
  body += `Email:  ${email}\n`;
  body += `Date:   ${date}\n\n`;
  body += `${'─'.repeat(48)}\n`;

  PRODUCTS.forEach(cat => {
    const picks = cat.items.filter(i => selected.has(i.id));
    if (picks.length) {
      body += `\n${cat.category.toUpperCase()}\n`;
      picks.forEach(p => {
          const rowEl = document.querySelector(`.product-row[data-id="${p.id}"]`);
          const input = rowEl ? rowEl.querySelector('.colour-input') : null;
          const colourText = rowEl ? rowEl.querySelector('.prod-colour') : null;
          const colour = (input && input.value) ? input.value : (colourText ? colourText.textContent : '');
          body += `  -  ${p.name} — ${colour}\n`;
        });
    }
  });

  body += `\n${'─'.repeat(48)}\n`;
  if (notes) {
    body += `NOTES\n${notes}\n\n`;
  }
  body += `© 2026 Easytimes Trading Pty Ltd`;

  const subject = encodeURIComponent(`LDH SS26 Sample EOI — ${name}`);
  const bodyEnc = encodeURIComponent(body);

  window.location.href = `mailto:${RECIPIENT_EMAIL}?subject=${subject}&body=${bodyEnc}`;
}

function toggleEditMode() {
  const btn = document.getElementById('edit-toggle');
  document.body.classList.toggle('edit-mode');
  const isEdit = document.body.classList.contains('edit-mode');
  btn.textContent = isEdit ? 'Done' : 'Edit Colours';
  btn.classList.toggle('active', isEdit);
}
